<!DOCTYPE html>
<html lang="pt">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>Du Stock</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="style.css" />
</head>

<body>

  <header class="navbar">

    <div class="logo">
      DU STOCK
    </div>

    <nav>

      <button class="tab active" data-category="sneakers">
        Sneakers
      </button>

      <button class="tab" data-category="clothing">
        Clothing
      </button>

    </nav>

    <div class="navbar-right">

      <div class="lang-switch">

        <button class="lang-btn active-lang" id="ptBtn">
          PT
        </button>

        <button class="lang-btn" id="enBtn">
          EN
        </button>

      </div>

      <button id="themeToggle">
        🌙
      </button>

    </div>

  </header>

  <section class="controls">

    <input
      type="text"
      id="searchInput"
      placeholder="Pesquisar produto..."
    >

    <select id="sortSelect">

      <option value="default">
        Ordenar
      </option>

      <option value="low-high">
        Preço: Menor → Maior
      </option>

      <option value="high-low">
        Preço: Maior → Menor
      </option>

    </select>

  </section>

  <main>

    <div class="grid" id="productGrid"></div>
    
  </main>

  <footer class="site-footer">
    <p>&copy; Du Stock</p>
    <p id="shippingText">Preços de envio não incluídos</p>
  </footer>

  <div id="imageModal" class="modal">
      <span class="close-modal" onclick="closeModal()">&times;</span>
      <img class="modal-content" id="modalImg">
    </div>
  
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>
  <script src="supabase.js"></script>
  <script src="script.js"></script>

</body>
</html>

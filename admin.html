<!DOCTYPE html>
<html lang="pt">

<head>

  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>Admin</title>

  <link rel="stylesheet" href="style.css">

</head>

<body>

<div class="admin-panel">

  <h1>Adicionar Produto</h1>

  <input type="text" id="name" placeholder="Nome">

  <input type="text" id="sku" placeholder="SKU">

  <input type="text" id="sizes" placeholder="42 (2),43 (1)">

  <input type="number" id="oldPrice" placeholder="Preço antigo">

  <input type="number" id="price" placeholder="Preço">

  <input type="text" id="image" placeholder="URL imagem">

  <select id="category">

    <option value="sneakers">Sneakers</option>

    <option value="clothing">Clothing</option>

  </select>

  <button id="addProduct">
    Adicionar Produto
  </button>

  <button id="logoutBtn">
    Logout
  </button>

</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>

<script src="supabase.js"></script>

<script src="admin.js"></script>

</body>
</html>
